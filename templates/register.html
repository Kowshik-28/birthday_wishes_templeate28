{% extends 'Layout.html' %}

{% block title %}Surprise Craft - Register{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h1 class="logo-text">🎂 SurpriseCraft</h1>
            <p class="auth-subtitle">Create custom interactive birthday experiences</p>
        </div>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group col">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group col">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group col">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="firstname" placeholder="First Name" required>
                </div>
                <div class="form-group col">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Last Name" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group col">
                    <label for="role">Role</label>
                    <input type="text" id="role" name="role" placeholder="e.g. Friend, Creator" value="Creator" required>
                </div>
                <div class="form-group col">
                    <label for="phone_number">Phone Number</label>
                    <input type="text" id="phone_number" name="phone_number" placeholder="Phone Number" required autocomplete="tel">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
            </div>
            
            <div class="form-group">
                <label for="password2">Verify Password</label>
                <input type="password" id="password2" name="password2" placeholder="Repeat the password" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-glow">Create Account</button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="/auth/login-page" class="link-highlight">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
