<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Birthday Surprise{% endblock %}</title>
    
    <!-- Modern Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Sacramento&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Base Stylesheet -->
    <link rel="stylesheet" href="/static/css/base.css">
    
    {% block head %}{% endblock %}
</head>
<body>
    {% block content %}
    {% endblock %}
    
    <!-- Helper scripts -->
    <script src="/static/js/base.js" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
