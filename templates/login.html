{% extends 'Layout.html' %}

{% block title %}Surprise Craft - Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <h1 class="logo-text">🎂 SurpriseCraft</h1>
            <p class="auth-subtitle">Craft magical birthday moments for your friends</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-glow">Sign In</button>
        </form>
        
        <div class="auth-footer">
            <p>New to SurpriseCraft? <a href="/auth/register-page" class="link-highlight">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
